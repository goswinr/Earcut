name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
           dotnet-version: '10.x'

      - name: Restore .NET tools (Fable)
        run: dotnet tool restore

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '26.x'

      - name: Build fable
        run: dotnet fable --noCache

      - name: Run tests JS
        run: node Test/test.js